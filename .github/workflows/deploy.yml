name: Deploy Theme

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
      
    - name: "Deploy Date: ${{ github.event.head_commit.timestamp }}"
      run: |
        echo "Last Commit Message: ${{ github.event.head_commit.message }}"